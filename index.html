<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dania Awin — Research & strategic advisory</title>
  <meta name="description" content="Research and strategic advisory on technology, power and institutions." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=EB+Garamond:ital,wght@0,400..600;1,400..500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="lang-en">

  <header>
    <div class="marginalia">
      <div class="left" data-c="marginalia.left"></div>
      <div class="center"></div>
      <div class="right" data-c="marginalia.right"></div>
    </div>

    <nav class="nav wrap">
      <a href="index.html" class="nav__brand" data-c="brand"></a>
      <div class="nav__links">
        <a href="index.html" class="is-active" data-c="nav.home"></a>
        <a href="writing.html" data-c="nav.writing"></a>
        <a href="work.html" data-c="nav.work"></a>
        <a href="about.html" data-c="nav.about"></a>
        <a href="contact.html" data-c="nav.contact"></a>
        <button class="nav__lang" id="langToggle" aria-label="Toggle language">
          <span data-lang="nl">NL</span><span class="divider">/</span><span data-lang="en">EN</span>
        </button>
      </div>
    </nav>
  </header>

  <main class="wrap">

    <section class="hero">
      <div>
        <div class="eyebrow hero__eyebrow" data-c="home.eyebrow"></div>
        <h1 class="display" data-c="home.heroHeadline"></h1>
        <p class="hero__sub" data-c="home.heroSub"></p>
      </div>
    </section>

    <section class="featured">
      <div class="featured__head">
        <h2 class="section" data-c="home.introHeading"></h2>
      </div>
      <div class="prose" id="home-intro" style="max-width: 58ch;"></div>
    </section>

    <section class="featured" id="featured-essays">
      <div class="featured__head">
        <h2 class="section" data-c="home.featuredHeading"></h2>
        <a href="writing.html" class="eyebrow" style="color: var(--oxblood);" data-c="home.featuredAllLink"></a>
      </div>
      <div class="featured__list" id="featured-list"></div>
    </section>

    <section class="work-blocks">
      <h2 class="section" data-c="home.whatIDoHeading"></h2>
      <div class="work-blocks__grid" id="what-i-do-blocks"></div>
    </section>

  </main>

  <footer class="foot">
    <div class="left" data-c="footer.copyright"></div>
    <div class="center" data-c="footer.quote"></div>
    <div class="right">
      <a href="contact.html" data-c="footer.contactLink"></a>
    </div>
  </footer>



  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="script.js"></script>
</body>
</html>
